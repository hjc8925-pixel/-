<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff; --bg2:#f5f9f7; --bg3:#eef4f1;
    --text:#1a2e28; --text2:#5e726b; --text3:#9aaca5;
    --border:rgba(26,110,86,0.13); --border2:rgba(26,110,86,0.26);
    --teal:#178563; --teal-d:#0d5f48; --teal-dd:#063a2c; --teal-soft:#e6f3ee; --teal-tint:#f1f9f5;
    --amber:#b07614; --amber-d:#7e520a; --amber-soft:#fbf2e0;
    --red:#d64545; --red-d:#9e2c2c; --red-soft:#fbecec;
    --r:12px; --r-lg:16px; --r-sm:9px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;font-size:15px;color:var(--text);background:#f2f6f4;line-height:1.65;min-height:100vh}
  .app{max-width:680px;margin:0 auto;padding:1.25rem 1rem 4rem}

  .hd{background:linear-gradient(135deg,#0a4d3a,#178563 62%,#2aa478);border-radius:20px;padding:22px 20px 24px;position:relative;overflow:hidden;margin-bottom:1.1rem;box-shadow:0 8px 24px rgba(13,95,72,0.22)}
  .hd::after{content:'';position:absolute;right:-24px;top:-36px;width:130px;height:130px;background:rgba(255,255,255,0.07);border-radius:50%}
  .hd::before{content:'';position:absolute;right:36px;bottom:-50px;width:100px;height:100px;background:rgba(255,255,255,0.05);border-radius:50%}
  .hd-row{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
  .hd-logo{width:40px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.94);flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.12)}
  .hd-logo img{width:27px;height:auto}
  .hd-church{font-size:11px;font-weight:500;color:rgba(255,255,255,0.78)}
  .hd-title{font-size:19px;font-weight:700;color:#fff;letter-spacing:-0.2px}
  .hd-sub{font-size:11px;color:rgba(255,255,255,0.72);margin-top:7px;position:relative;z-index:1;font-style:italic}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
  .tab{padding:9px 11px;border-radius:var(--r-sm) var(--r-sm) 0 0;cursor:pointer;font-size:13px;color:var(--text2);background:transparent;border:none;font-family:inherit;border-bottom:2px solid transparent;display:flex;align-items:center;gap:4px;white-space:nowrap}
  .tab.on{color:var(--teal-d);font-weight:500;border-bottom-color:var(--teal)}
  .tab i{font-size:15px}

  .page{display:none}.page.on{display:block}
  .card{background:var(--bg);border:0.5px solid var(--border);border-radius:18px;padding:1rem 1.15rem;margin-bottom:0.9rem;box-shadow:0 2px 12px rgba(13,60,45,0.05)}

  .menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .menu-card{background:var(--bg);border:none;border-radius:18px;padding:15px 13px;cursor:pointer;transition:transform .12s,box-shadow .15s;box-shadow:0 3px 14px rgba(13,60,45,0.08);text-align:left}
  .menu-card:hover{box-shadow:0 6px 20px rgba(13,60,45,0.13)}
  .menu-card:active{transform:scale(0.97)}
  .mc-ic{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center}
  .mc-ic svg{width:19px;height:19px}
  .menu-card .t{font-size:13.5px;font-weight:600;margin-top:9px;color:var(--text)}
  .menu-card .d{font-size:10.5px;color:var(--text2);margin-top:1px;line-height:1.4}
  .purpose-strip{background:var(--bg);border-radius:15px;padding:12px 15px;margin-top:10px;box-shadow:0 2px 10px rgba(13,60,45,0.06);display:flex;gap:10px;align-items:center}
  .purpose-strip svg{width:20px;height:20px;color:var(--teal);flex-shrink:0}
  .purpose-strip .px{font-size:11.5px;color:var(--text2);line-height:1.5}
  .purpose-strip .px b{color:var(--teal-d)}

  .gate{max-width:420px;margin:0 auto;background:var(--bg);border-radius:22px;overflow:hidden;box-shadow:0 6px 24px rgba(13,60,45,0.12)}
  .gate-hero{background:linear-gradient(160deg,#0a4d3a,#178563);padding:28px 20px;color:#fff;text-align:center;position:relative;overflow:hidden}
  .gate-hero::after{content:'';position:absolute;left:-30px;bottom:-40px;width:110px;height:110px;background:rgba(255,255,255,0.06);border-radius:50%}
  .gate-hero svg{width:38px;height:38px}
  .gate-hero .gt{font-size:16px;font-weight:700;margin-top:9px;position:relative}
  .gate-body{padding:18px 20px 20px}
  .gate-msg{font-size:13.5px;line-height:1.75;color:var(--text);text-align:center}
  .gate-msg b{color:var(--teal-d)}
  .gate-verse{background:var(--teal-tint);border-radius:12px;padding:11px 14px;margin-top:14px;font-size:11.5px;font-style:italic;color:var(--teal-d);text-align:center;line-height:1.6}
  .gate-btn{width:100%;margin-top:16px;padding:13px;border:none;border-radius:13px;background:var(--teal);color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 4px 14px rgba(23,133,99,0.3)}
  .gate-btn:active{transform:scale(0.98)}
  .form-group{margin-bottom:13px}
  .form-group textarea,.form-group input{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:10px;font-family:inherit;font-size:13.5px;background:var(--bg);color:var(--text);line-height:1.6;resize:vertical}
  .form-group textarea:focus,.form-group input:focus{outline:none;border-color:var(--teal)}
  .adm-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
  .adm-bar .btn-primary#adm-save:not(.on){background:var(--text3);border-color:var(--text3)}
  .adm-lab{font-size:12px;font-weight:600;color:var(--teal-d);display:block;margin-bottom:4px}
  .seg{display:flex;gap:0;background:var(--bg3);border-radius:11px;padding:3px;margin-bottom:14px}
  .seg-btn{flex:1;padding:8px;border:none;background:transparent;border-radius:9px;font-family:inherit;font-size:12.5px;color:var(--text2);cursor:pointer;font-weight:500}
  .seg-btn.on{background:var(--bg);color:var(--teal-d);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
  .adm-gtags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
  .gtag{font-size:11px;padding:4px 9px;border-radius:14px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
  .gtag.on{background:var(--teal-soft);color:var(--teal-d);border-color:var(--teal);font-weight:600}
  .btn-del{color:var(--red-d);border-color:transparent}
  .turn-edit{border-radius:11px;padding:11px;margin-bottom:9px;border:1px solid var(--border)}
  .turn-edit.them{background:var(--amber-soft)}
  .turn-edit.us{background:var(--teal-soft)}
  .turn-edit-head{display:flex;gap:5px;align-items:center;margin-bottom:7px}
  .who-btn{font-size:11px;padding:4px 9px;border-radius:8px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit}
  .who-btn.on{background:var(--teal);color:#fff;border-color:var(--teal);font-weight:600}
  .turn-edit.them .who-btn.on{background:var(--amber);border-color:var(--amber)}
  .btn-del2{margin-left:auto;border:none;background:transparent;color:var(--red-d);cursor:pointer;font-size:15px;padding:2px 6px}
  .turn-edit textarea,.turn-edit input{width:100%;padding:7px 9px;border:1px solid var(--border2);border-radius:8px;font-family:inherit;font-size:12.5px;background:var(--bg);color:var(--text);line-height:1.5}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r-sm);border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-size:13.5px;color:var(--text);font-family:inherit}
  .btn:hover{background:var(--bg2)}
  .btn-primary{background:var(--teal);color:#fff;border-color:var(--teal)}
  .btn-primary:hover{opacity:.9;background:var(--teal)}
  .btn-sm{padding:6px 11px;font-size:12.5px}

  .eyebrow{font-size:11px;font-weight:500;letter-spacing:1.5px;color:var(--teal-d);text-transform:uppercase;margin-bottom:5px}
  .h-sec{font-size:17px;font-weight:500;color:var(--text);margin-bottom:4px}
  .lead{font-size:13px;color:var(--text2);margin-bottom:1rem}

  input[type=password],input[type=text],textarea,select{width:100%;padding:9px 11px;border:0.5px solid var(--border2);border-radius:var(--r-sm);font-family:inherit;font-size:14px;background:var(--bg);color:var(--text)}

  .check{display:flex;align-items:flex-start;gap:11px;padding:11px 2px;border-bottom:0.5px solid var(--border)}
  .check:last-child{border-bottom:none}
  .check input{width:19px;height:19px;flex-shrink:0;margin-top:1px;cursor:pointer;accent-color:var(--teal)}
  .check label{font-size:13.5px;line-height:1.5;cursor:pointer;flex:1}
  .check .sub{font-size:11.5px;color:var(--text2);margin-top:3px;display:block}

  .heart-banner{border:0.5px solid var(--border2);border-radius:var(--r-lg);overflow:hidden;margin-bottom:1rem}
  .heart-top{background:var(--teal-soft);padding:16px 18px;position:relative;overflow:hidden}
  .heart-top::after{content:'';position:absolute;right:-20px;bottom:-28px;width:90px;height:90px;border:2px solid rgba(23,133,99,0.15);border-radius:50%}
  .heart-lead{font-size:13.5px;line-height:1.7;color:var(--teal-d);position:relative;z-index:1}
  .heart-lead b{font-weight:500;color:var(--teal-dd)}
  .heart-verse{background:var(--teal-tint);padding:11px 14px;font-size:12px;font-style:italic;color:var(--teal-d);line-height:1.6}

  .dots{display:flex;gap:5px;align-items:center}
  .stage-bar{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:10px}
  .stage-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#e0ded6;color:#fff}
  .stage-dot.on{background:var(--teal)}
  .stage-dot.done{background:var(--teal-d)}
  .stage-line{width:50px;height:3px;background:#e0ded6;border-radius:2px}
  .stage-line.on{background:var(--teal)}
  .step-label{text-align:center;font-size:12.5px;font-weight:600;color:var(--teal-d);margin-bottom:12px}
  .rank-row{width:100%;display:flex;align-items:center;justify-content:space-between;padding:11px 12px;border:none;border-bottom:0.5px solid var(--border);background:transparent;cursor:pointer;font-family:inherit;border-radius:8px}
  .rank-row:hover{background:var(--teal-tint)}
  .rank-name{font-size:13.5px;font-weight:500;color:var(--text);display:flex;align-items:center}
  .dot{width:11px;height:11px;border-radius:50%;background:#e0ded6}
  .dot.f{background:var(--red)}
  .dot.h{background:var(--red);opacity:0.45}
  .dot-label{font-size:11px;font-weight:500;margin-left:5px}

  .notice{border-left:3px solid var(--amber);background:var(--amber-soft);border-radius:0 var(--r) var(--r) 0;padding:13px 15px;margin-bottom:14px}
  .notice .t{font-size:14px;font-weight:500;color:var(--amber-d);margin-bottom:3px}
  .notice .d{font-size:12px;color:var(--amber-d);line-height:1.5;opacity:0.85}

  .acc{border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:9px;background:var(--bg)}
  .acc.open{border-color:var(--border2)}
  .acc-head{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;cursor:pointer}
  .acc.open .acc-head{background:var(--teal-tint)}
  .acc-head .l{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:500;color:var(--text)}
  .acc-head .l i{color:var(--teal);font-size:18px}
  .acc-head .chev{color:var(--text2);transition:transform .25s}
  .acc.open .chev{transform:rotate(90deg);color:var(--teal)}
  .acc-body{display:none;padding:14px 15px;border-top:0.5px solid var(--border);flex-direction:column;gap:10px}
  .acc.open .acc-body{display:flex}

  .turn{display:flex;gap:8px;align-items:flex-start}
  .turn.us{flex-direction:row-reverse}
  .turn-ic{width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .turn.them .turn-ic{background:var(--amber-soft)}
  .turn.them .turn-ic i,.turn.them .turn-ic svg{color:var(--amber)}
  .turn.us .turn-ic{background:var(--teal-soft)}
  .turn.us .turn-ic i,.turn.us .turn-ic svg{color:var(--teal)}
  .turn-body{flex:1;min-width:0}
  .turn-role{font-size:9.5px;font-weight:500;margin-bottom:2px}
  .turn.them .turn-role{color:var(--amber-d)}
  .turn.us .turn-role{color:var(--teal-d);text-align:right}
  .bubble{font-size:13px;line-height:1.55;padding:9px 12px}
  .turn.them .bubble{background:var(--amber-soft);border-radius:3px 11px 11px 11px;color:var(--text)}
  .turn.us .bubble{background:var(--teal-soft);border-radius:11px 3px 11px 11px;color:var(--text)}
  .bubble .v{font-size:11px;color:var(--teal-d);font-style:italic;margin-top:5px;padding-left:8px;border-left:2px solid var(--teal)}
  .bubble .nt{display:inline-block;font-size:9.5px;font-weight:500;color:var(--red-d);background:var(--red-soft);padding:1px 7px;border-radius:5px;margin-bottom:4px}
  .dbg-img{margin:0 0 4px;border:0.5px solid var(--border);border-radius:var(--r-sm);overflow:hidden;background:var(--bg2)}
  .dbg-img img{width:100%;display:block}
  .dbg-img figcaption{font-size:11px;color:var(--text2);padding:7px 10px;line-height:1.45;border-top:0.5px solid var(--border)}

  .info-block{margin-bottom:14px}
  .info-block .lab{font-size:11px;font-weight:500;letter-spacing:0.5px;color:var(--teal-d);margin-bottom:4px;display:flex;align-items:center;gap:5px}
  .info-block .txt{font-size:13.5px;line-height:1.65;color:var(--text)}
  .tag{display:inline-block;font-size:11.5px;padding:3px 10px;border-radius:7px;background:var(--teal-soft);color:var(--teal-d);margin:2px 3px 2px 0}
  .danger-block .lab{color:var(--red-d)}
  .danger-block .txt{background:var(--red-soft);border-radius:var(--r-sm);padding:11px 13px}

  .group-pill{font-size:12px;padding:5px 12px;border-radius:18px;border:0.5px solid var(--border2);color:var(--text2);background:transparent;cursor:pointer;font-family:inherit;white-space:nowrap}
  .group-pill.on{background:var(--teal-soft);color:var(--teal-d);font-weight:500;border-color:var(--teal)}
  .pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}

  .empty{text-align:center;padding:2rem;color:var(--text2);font-size:13.5px}
  .src{font-size:11px;color:var(--text3);margin-top:10px;padding-top:9px;border-top:0.5px dashed var(--border)}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
</style>
</head>
<body>
<div class="app">
  <h1 class="sr-only">이단 분별 안내</h1>
  <div class="hd">
    <div class="hd-row">
      <div class="hd-logo"><img id="logo-img" alt=""></div>
      <div>
        <div class="hd-church">선한목자교회 · 기독교대한감리회</div>
        <div class="hd-title">이단 분별 안내</div>
      </div>
    </div>
    <div class="hd-sub">"온유와 두려움으로 대답할 것을 준비하라" (벧전 3:15)</div>
  </div>

  <div class="tabs">
    <button class="tab on" data-tab="home" onclick="tab('home')"><i class="ti ti-home"></i> 홈</button>
    <button class="tab" data-tab="check" onclick="tab('check')"><i class="ti ti-clipboard-check"></i> 점검</button>
    <button class="tab" data-tab="groups" onclick="tab('groups')"><i class="ti ti-book-2"></i> 이단별 정리</button>
    <button class="tab" data-tab="debate" onclick="tab('debate')"><i class="ti ti-messages"></i> 성경의 답</button>
    <button class="tab" data-tab="admin" onclick="tab('admin')"><i class="ti ti-settings"></i> 관리</button>
  </div>

  <div id="t-home" class="page on"></div>
  <div id="t-check" class="page"></div>
  <div id="t-groups" class="page"></div>
  <div id="t-debate" class="page"></div>
  <div id="t-admin" class="page"></div>
</div>

        {who:'them',text:'일요일 예배는 로마가 정한 태양신 숭배일입니다. 콘스탄틴 황제가 321년에 법으로 바꾸기 전까지 초대교회도 안식일을 지켰어요.'},
        {who:'us',text:'초대교회는 예수님의 부활을 기념해 이미 주일(첫날)에 모였습니다.',verse:['행 20:7','그 주간의 첫날에 우리가 떡을 떼려 하여 모였더니']},
        {who:'us',text:'콘스탄틴 훨씬 이전의 교회사 기록도 이를 증언합니다. 터툴리안은 "주일에 그리스도인들은 주님의 부활을 기념한다"고 했고, 이그나시우스는 "더 이상 일곱째 날을 지키지 않으며 주일을 지키며 산다"고 썼습니다. 저스틴도 주일을 부활을 기념하는 날로 증언했습니다. 일요일 예배는 황제가 만든 게 아니라 부활 신앙에서 나온 것입니다.',note:'콘스탄틴 이전 기록'},
        {who:'them',text:'예수님도 안식일을 지키셨잖아요. 우리도 본받아야죠.'},
        {who:'us',text:'예수님이 안식일에 회당에 가신 건 맞지만, 동시에 "안식일의 주인은 인자"라 하시며 그 규례를 뛰어넘으셨습니다. 본받을 핵심은 요일이 아니라 그분이 주신 참 안식, 곧 구원입니다.',verse:['막 2:27-28','안식일이 사람을 위하여 있는 것이요… 인자는 안식일에도 주인이니라']},
        {who:'them',text:'그래도 십계명에 안식일을 지키라 한 건 영원한 계명 아닌가요?'},
        {who:'us',text:'안식일은 장차 올 그리스도의 그림자였고, 실체는 그리스도이십니다. 구원은 날을 지키는 데 있지 않습니다.',verse:['골 2:16-17','절기나 초하루나 안식일을 이유로 비판하지 못하게 하라 이것들은 장래 일의 그림자이나 몸은 그리스도의 것이니라']}
      ]},
      {topic:'성탄절은 이방 축제이니 지키면 안 된다?', icon:'ti-gift', turns:[
        {who:'them',text:'성탄절은 성경에 없고 이방 태양신 축제에서 유래했으니 지키면 안 됩니다.'},
        {who:'us',text:'성경이 날짜를 못박지 않은 건 맞지만, 예수님의 오심을 기념하는 것 자체가 죄는 아닙니다. 바울은 어떤 날을 중히 여기든 각자 마음으로 확정하라고 했습니다. 중요한 건 날짜가 아니라 성육신의 진리입니다.',verse:['롬 14:5-6','어떤 사람은 이 날을 저 날보다 낫게 여기고… 각각 자기 마음으로 확정할지니라']}
      ]},
      {topic:'부활절(Easter)은 여신 숭배에서 왔다?', icon:'ti-sunrise', turns:[
        {who:'them',text:'부활절을 뜻하는 Easter는 바벨론 여신 이스타르(Ishtar)에서 온 말입니다. 부활절은 우상숭배예요.'},
        {who:'us',text:'언어학적으로 전혀 다른 어원입니다. Ishtar는 셈어족 고대 아카드어이고, Easter는 인도유럽어족 고대 게르만어 "Eostre"에서 왔으며 본뜻은 "동쪽·새벽"입니다. 발음이 비슷하다는 이유만으로 연결하는 것은 심각한 비약입니다.'},
        {who:'them',text:'그래도 부활절이라는 절기 자체가 이교에서 온 것 아닌가요?'},
        {who:'us',text:'결정적으로, 부활절을 Easter라 부르는 곳은 영어·독일어권뿐입니다. 초대교회 때부터 전 세계 기독교는 부활절을 "파스카(Pascha)"라 불렀고, 이는 유월절을 뜻하는 히브리어 "페사흐"에서 온 말입니다. 그리스어·라틴어·프랑스어·러시아어가 모두 그렇습니다. 부활절은 이교가 아니라 유월절이 그리스도 안에서 완성된 절기입니다.',note:'전 세계가 부르는 이름은 파스카'},
        {who:'us',text:'설령 영어 단어에 게르만족 봄 달력 명칭의 잔재가 남아 있더라도, 우리가 기리는 본질은 십자가에서 죽으시고 사흘 만에 부활하신 예수 그리스도이지 어떤 여신이 아닙니다. 본질 대신 껍데기 단어만 잡는 공격입니다.',verse:['고전 15:3-4','성경대로 그리스도께서 우리 죄를 위하여 죽으시고… 사흘 만에 다시 살아나사']}
      ]},
      {topic:'구원의 새 이름은 안상홍이다?', icon:'ti-signature', turns:[
        {who:'them',text:'신약 시대 구원의 이름이 "예수"였듯, 마지막 시대엔 새 이름인 "안상홍"으로 구원받습니다. 사실 "예수"라는 이름도 성경에 직접 없었습니다.'},
        {who:'us',text:'예수님이 그리스도이심은 새 이름으로 아는 게 아니라, 그분이 구약의 예언을 그대로 이루셨다는 사실로 압니다. 베드로는 "천하에 구원받을 다른 이름을 주신 일이 없다"며 예수의 이름을 분명히 했습니다.',verse:['행 4:12','다른 이로써는 구원을 받을 수 없나니 천하 사람 중에 구원을 받을 만한 다른 이름을 우리에게 주신 일이 없음이라']},
        {who:'them',text:'계시록 14장 2절의 "많은 물소리"는 넓을 홍(洪), "거문고 타는 소리"는 거문고 음계 상(商), 안식일의 주인이시니 편안 안(安) — 합치면 "안상홍"이 성경에 예언돼 있습니다.'},
        {who:'us',text:'그 구절의 거문고와 물소리는 하늘 예배의 웅장함을 묘사하는 표현이지 사람 이름의 한자 풀이가 아닙니다. 히브리어·헬라어로 기록된 성경 원문에 한국어 한자를 끼워맞추는 건 문맥과 전혀 무관한 억측입니다. 또 "새 이름"은 이긴 자에게 주시는 그리스도의 약속이지 특정 인물에게 주는 이름이 아닙니다.',verse:['계 2:17','이기는 그에게는… 새 이름을 기록한 흰 돌을 주리라']},
        {who:'them',text:'마태복음 28장 19절에 "아버지와 아들과 성령의 이름으로 세례를 주라" 했으니 성령도 이름이 있는 인격체입니다. 그 성령의 이름이 안상홍입니다.'},
        {who:'us',text:'그 구절의 "이름"은 한 호칭 안에 계신 삼위 하나님의 권위를 뜻하지, 성령의 고유한 사람 이름을 가리키지 않습니다. 성경 어디에도 성령의 이름이 "안상홍"이라는 근거는 없습니다. 오히려 예수님은 자칭 그리스도가 일어날 것을 경고하셨습니다.',verse:['마 24:5','많은 사람이 내 이름으로 와서 이르되 나는 그리스도라 하여 많은 사람을 미혹하리라']}
      ]},

        {who:'them',text:'다윗왕의 재위 40년은 예언입니다. 안상홍님 책에 "40년 역사가 겨우 3년으로 끝났으니 나머지 37년을 어떻게 처리해야 될 것인가? 이 37년이 마지막 때에 나타나 복음사업을 행함으로 40년의 예언이 성취된다"고 쓰여 있습니다(『하나님의 비밀』 79쪽).'},
        {who:'us',text:'먼저 성경 어디에도 "다윗의 재위 40년이 그리스도가 채워야 할 예언"이라거나 재림 그리스도가 "37년을 채운다"는 근거가 없습니다. 임의로 만든 계산입니다.'},
        {who:'us',text:'사실관계도 맞지 않습니다. 그들은 안상홍이 1948년 침례를 받아 37년 사역했다고 하지만, 남아 있는 안식교 침례 기록은 1954년(단기 4287년)입니다. 1954년부터 1985년 사망까지는 31년이지 37년이 아닙니다. 연도 계산부터 사실과 어긋납니다.',note:'연도 자체가 사실과 불일치'}
      ]},

        {who:'them',text:'창세기 1:26 "우리의 형상을 따라"에서 "우리"(엘로힘)가 복수형이니 아버지·어머니 하나님을 뜻합니다.'},
        {who:'us',text:'엘로힘은 신이 여럿이라는 뜻이 아니라 하나님의 존엄을 나타내는 히브리어의 "장엄 복수형"입니다. 또 "형상"은 남자·여자라는 육체적 성별이 아니라, 사람이 하나님과 같은 영적 존재로 지음 받았다는 뜻입니다. 하나님은 영이시기 때문입니다.',verse:['요 4:24','하나님은 영이시니 예배하는 자가 영과 진리로 예배할지니라']},
        {who:'them',text:'"위에 있는 예루살렘은 우리 어머니"(갈 4:26)라는 구절이 바로 어머니 하나님(장길자)입니다.'},
        {who:'us',text:'문맥상 이는 하갈(율법, 옛 언약·유대교)과 대조되는 사라(복음, 새 언약·초대교회)의 비유입니다. 그리스도를 통해 주어지는 "복음의 자유"를 상징하지 특정 여인을 가리키지 않습니다. 신약의 영적 새 예루살렘은 하나님의 새 백성인 교회를 뜻합니다.',verse:['갈 4:24','이것은 비유니 이 여자들은 두 언약이라']},
        {who:'them',text:'아담은 재림 그리스도의 표상이고, 아담의 아내 하와는 어린양의 아내를 표상합니다. 그러니 재림 그리스도에게도 아내(어머니 하나님)가 있어야 합니다.'},
        {who:'us',text:'성경이 직접 풀어준 의미는 다릅니다. 바울은 부부 관계가 "그리스도와 교회"의 관계를 보여주는 비유라고 명시했습니다. 어린양의 아내는 한 여인이 아니라 그리스도의 신부된 교회입니다.',verse:['엡 5:32','이 비밀이 크도다 나는 그리스도와 교회에 대하여 말하노라']},

function tab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===name));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('t-'+name).classList.add('on');
  if(name==='home')renderHome();
  if(name==='check')renderCheck();
  if(name==='groups')renderGroups();
  if(name==='debate')renderDebate();
  if(name==='admin')renderAdmin();
  window.scrollTo({top:0,behavior:'smooth'});
}

let basicHits=0;

    : {step:'2단계 · 심층 점검', guide:'좀 더 구체적인 신호를 확인할게요. 들었거나 본 적 있는 것을 체크해 주세요.'};

    <div class="notice" style="border-left-color:var(--teal);background:var(--teal-soft)">

      <div class="d" style="color:var(--teal-d)">${intro.desc}</div>
    </div>
    <div style="display:flex;gap:7px;margin-bottom:14px">
      <button class="group-pill ${!isChild?'on':''}" onclick="switchCheck('self')">자기 점검</button>
      <button class="group-pill ${isChild?'on':''}" onclick="switchCheck('child')">자녀 점검</button>
    </div>
    <div class="stage-bar">
      <div class="stage-dot ${checkStage==='basic'?'on':'done'}">1</div>
      <div class="stage-line ${checkStage==='deep'?'on':''}"></div>
      <div class="stage-dot ${checkStage==='deep'?'on':''}">2</div>
    </div>
    <div class="step-label">${stageInfo.step}</div>
    <div class="card">
      <div class="lead" style="margin-bottom:12px">${stageInfo.guide}</div>
      <div id="check-list">${stageList.map((c,i)=>`
        <div class="check"><input type="checkbox" id="ck${i}" ${c.g?`data-g='${JSON.stringify(c.g)}'`:''}><label for="ck${i}">${c.t}</label></div>`).join('')}</div>
      <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
        ${checkStage==='basic'
          ? `<button class="btn btn-primary" onclick="goDeep()"><i class="ti ti-arrow-right"></i> 다음 (심층 점검)</button>`
          : `<button class="btn btn-primary" onclick="seeResult()"><i class="ti ti-clipboard-check"></i> 결과 보기</button>
             <button class="btn" onclick="backToBasic()"><i class="ti ti-arrow-left"></i> 이전</button>`}

      </div>
    </div>

}

function switchCheck(t){checkTarget=t;checkStage='basic';basicHits=0;renderCheck();}
function goDeep(){
  basicHits=document.querySelectorAll('#check-list input:checked').length;
  checkStage='deep';renderCheck();window.scrollTo({top:0,behavior:'smooth'});
}
function backToBasic(){checkStage='basic';renderCheck();window.scrollTo({top:0,behavior:'smooth'});}

function seeResult(){
  const checked=[...document.querySelectorAll('#check-list input:checked')];
  const resEl=document.getElementById('check-result');
  const deepCount=checked.length;
  if(basicHits===0 && deepCount===0){
    resEl.innerHTML=`<div class="notice"><div class="d" style="color:var(--amber-d)">체크된 항목이 없어요. 해당되는 신호를 골라 주세요.</div></div>`;
    resEl.scrollIntoView({behavior:'smooth'});return;
  }
  // 심층 신호로 단체 점수 집계
  const score={};
  checked.forEach(c=>{ if(c.dataset.g) JSON.parse(c.dataset.g).forEach(gid=>score[gid]=(score[gid]||0)+1); });
  const ranked=Object.entries(score).map(([gid,n])=>({g:DATA.find(x=>x.id===gid),n})).filter(x=>x.g).sort((a,b)=>b.n-a.n);

  if(ranked.length===0){
    // 기본 신호만 있고 심층 고유 신호는 없음 → 단체 지목 없이 주의 안내
    const lvl = basicHits>=4 ? '여러 가지' : (basicHits>=2 ? '몇 가지' : '일부');
    resEl.innerHTML=`
      <div class="notice">
        <div class="t"><i class="ti ti-alert-triangle"></i> 주의가 필요한 신호가 ${lvl} 보여요</div>
        <div class="d">아직 특정 단체를 가리키는 결정적 신호는 보이지 않지만, 기본 신호가 ${basicHits}개 확인됐어요. 관심을 가지고 지켜보고, 교회 목회자와 상의해 보세요.</div>
      </div>
      <div class="card">
        <div style="font-size:13px;color:var(--text2);line-height:1.6">이단별 정리와 "성경은 이렇게 말해요"를 미리 살펴두면 도움이 됩니다.</div>
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" onclick="tab('groups')"><i class="ti ti-book-2"></i> 이단별 정리 보기</button>
          <button class="btn btn-sm" onclick="tab('debate')"><i class="ti ti-messages"></i> 성경의 답 보기</button>
        </div>
      </div>`;
    resEl.scrollIntoView({behavior:'smooth',block:'start'});return;
  }

  const max=ranked[0].n;
  const top=ranked[0];
  resEl.innerHTML=`
    <div class="notice">
      <div class="t"><i class="ti ti-alert-triangle"></i> ${top.g.name}와(과) 가까운 신호가 보여요</div>
      <div class="d">정죄가 아니라 함께 분별하기 위한 안내입니다. 가장 가까운 단체부터 아래에서 눌러 자료를 살펴보세요.</div>
    </div>
    <div class="card">
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px">기본 신호 ${basicHits}개 · 심층 신호 ${deepCount}개를 바탕으로 분석한 결과입니다</div>
      ${ranked.map((r,idx)=>{
        const ratio=r.n/max;
        const filled=ratio>=1?5:(ratio>=0.7?4:(ratio>=0.5?3:(ratio>=0.3?2:1)));
        const label=idx===0?'가장 가까움':(ratio>=0.5?'관련 있음':'조금 관련');
        return `<button class="rank-row" onclick="showGroupTab('${r.g.id}')">
          <span class="rank-name">${idx===0?'<i class="ti ti-arrow-badge-right" style="color:var(--red-d)"></i> ':''}${r.g.short}</span>
          <span class="dots">${dotRow(filled)}<span class="dot-label" style="color:${idx===0?'var(--red-d)':'var(--text2)'}">${label}</span><i class="ti ti-chevron-right" style="color:var(--text3);margin-left:4px"></i></span>
        </button>`;
      }).join('')}
      <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="showGroupTab('${top.g.id}')"><i class="ti ti-book-2"></i> ${top.g.short} 정리 보기</button>
        ${top.g.debates&&top.g.debates.length?`<button class="btn btn-sm" onclick="goDebate('${top.g.id}')"><i class="ti ti-messages"></i> ${top.g.short} — 성경의 답 보기</button>`:''}
      </div>
    </div>`;
  resEl.scrollIntoView({behavior:'smooth',block:'start'});
}

function dotRow(filled){
  let h='';
  for(let i=0;i<5;i++) h+=`<span class="dot ${i<filled?'f':''}"></span>`;
  return h;
}

function showGroupTab(id){tab('groups');setTimeout(()=>{const b=document.querySelector(`#g-pills .group-pill[data-id="${id}"]`);showGroup(id,b);if(b)b.scrollIntoView({inline:'center',behavior:'smooth'});},30);}

function renderGroups(){

      <div style="margin-top:4px"><button class="btn btn-primary btn-sm" onclick="goDebate('${g.id}')"><i class="ti ti-messages"></i> 이 단체에 성경은 이렇게 답해요</button></div>
      ${inf.source?`<div class="src"><i class="ti ti-quote" style="font-size:11px"></i> ${inf.source}</div>`:''}

let debateOk=false, pendingDebate=null;
function renderDebate(){
  const el=document.getElementById('t-debate');

    el.innerHTML=`
      <div class="gate">
        <div class="gate-hero">
          ${SVG.heart}

        </div>

          <div class="gate-msg" style="font-size:12px;color:var(--text2);margin-top:12px">이기려 하지 마세요. 위험하다 느끼면<br>멈추고 자리를 떠나도 됩니다.<br>먼저 나의 믿음을 지키는 것이 우선입니다.</div>
          <div class="gate-verse">"너희 마음에 그리스도를 주로 삼아 거룩하게 하고…<br>대답할 것을 항상 준비하되 온유와 두려움으로 하고"<br>(벧전 3:15)</div>
          <button class="gate-btn" onclick="confirmDebate()">확인했어요, 답변 보기</button>

    return;
  }
  el.innerHTML=`
    <div class="eyebrow">성경은 이렇게 말해요</div><div class="h-sec">단체를 선택하세요</div><div class="lead">그들이 흔히 하는 말과, 어떻게 답할 수 있는지 주제별로 정리했습니다.</div>

function confirmDebate(){debateOk=true;renderDebate();}

function showDebate(id, btn){
  if(btn){document.querySelectorAll('#d-pills .group-pill').forEach(p=>p.classList.remove('on'));btn.classList.add('on');}
  const g=DATA.find(x=>x.id===id);
  document.getElementById('d-detail').innerHTML=g.debates.map((d,i)=>`
    <div class="acc" id="acc-${id}-${i}">
      <div class="acc-head" onclick="toggleAcc('${id}-${i}')">

}

function turnHtml(t){
  const isUs=t.who==='us';
  const role=isUs?'우리의 답':'그들의 말';
  const svgUser='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a8.4 8.4 0 0 1 13 0"/></svg>';
  const svgChat='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16v11H8l-4 4z"/></svg>';
  const ic=isUs?svgChat:svgUser;
  return `<div class="turn ${t.who}">
    <div class="turn-ic">${ic}</div>
    <div class="turn-body">
      <div class="turn-role">${role}</div>
      <div class="bubble">${t.note?`<span class="nt">${t.note}</span><br>`:''}${t.text}${t.verse?`<div class="v">"${t.verse[1]}" (${t.verse[0]})</div>`:''}</div>
    </div>
  </div>`;
}

function toggleAcc(key){
  document.getElementById('acc-'+key).classList.toggle('open');
}

function hexSoft(c){
  const map={red:'#fdeceb',amber:'#fdf3e3',blue:'#e6f1fb',teal:'#e8f6f0',purple:'#eeedfe',green:'#eaf3de'};
  return map[c]||'#eee';
}

function admRenderGroups(){
  if(!admGroupId)admGroupId=E_DATA[0].id;
  const body=document.getElementById('adm-body');
  const pills=E_DATA.map(g=>`<button class="group-pill ${g.id===admGroupId?'on':''}" onclick="admGroupId='${g.id}';admRenderGroups()">${g.short}</button>`).join('');
  const g=E_DATA.find(x=>x.id===admGroupId);
  const f=g.info||(g.info={});
  const fields=[['origin','① 어떤 단체인가'],['claim','② 핵심 주장'],['method','③ 포교 방식'],['danger','④ 왜 위험한가']];
  let html=`<div class="pill-row">${pills}</div><div class="card">`;
  html+=admField('단체 이름','admEditName',g.name||'',false);
  fields.forEach(([k,label])=>{html+=admField(label,`admEditInfo('${k}'`,f[k]||'',true);});
  html+=`<div class="form-group"><label class="adm-lab">⑤ 주의할 위장 명칭 (한 줄에 하나)</label><textarea rows="4" oninput="admEditDisguise(this.value)">${(f.disguise||[]).join('\n')}</textarea></div>`;
  html+=admField('출처 표기 (선택)','admEditInfo(\'source\'',f.source||'',false);
  html+=`</div>`;
  body.innerHTML=html;
}
function admField(label,fn,val,area){
  const safe=(val||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
  const q=(val||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  const inp=area?`<textarea rows="3" oninput="${fn},this.value)">${safe}</textarea>`
                :`<input type="text" value="${q}" oninput="${fn.indexOf('(')>-1?fn+',this.value)':fn+'(this.value)'}">`;
  return `<div class="form-group"><label class="adm-lab">${label}</label>${inp}</div>`;
}
function admEditName(v){E_DATA.find(x=>x.id===admGroupId).name=v;markDirty();}
function admEditInfo(k,v){const g=E_DATA.find(x=>x.id===admGroupId);if(!g.info)g.info={};g.info[k]=v;markDirty();}
function admEditDisguise(v){const g=E_DATA.find(x=>x.id===admGroupId);if(!g.info)g.info={};g.info.disguise=v.split('\n').map(s=>s.trim()).filter(s=>s);markDirty();}

/* --- 체크리스트 편집 --- */
let admCheckStage='basic';
function admRenderChecks(){
  const body=document.getElementById('adm-body');
  const bankObj=admCheckKind==='self'?E_SELF:E_CHILD;
  const list=admCheckStage==='basic'?bankObj.basic:bankObj.deep;
  let html=`<div class="seg" style="margin-bottom:10px">
    <button class="seg-btn ${admCheckKind==='self'?'on':''}" onclick="admCheckKind='self';admRenderChecks()">자기 체크리스트</button>
    <button class="seg-btn ${admCheckKind==='child'?'on':''}" onclick="admCheckKind='child';admRenderChecks()">자녀 체크리스트</button>
  </div>`;
  html+=`<div class="seg" style="margin-bottom:12px">
    <button class="seg-btn ${admCheckStage==='basic'?'on':''}" onclick="admCheckStage='basic';admRenderChecks()">1단계 기본</button>
    <button class="seg-btn ${admCheckStage==='deep'?'on':''}" onclick="admCheckStage='deep';admRenderChecks()">2단계 심층</button>
  </div>`;
  html+= admCheckStage==='basic'
    ? `<div class="lead" style="margin-bottom:8px">공통 신호입니다. 단체를 가리지 않으니 단체 선택은 없습니다.</div>`
    : `<div class="lead" style="margin-bottom:8px">결정적 신호입니다. 어느 단체와 관련되는지 선택하세요. (화면에는 단체명이 보이지 않고, 결과 분석에만 쓰입니다.)</div>`;
  list.forEach((c,i)=>{
    html+=`<div class="card" style="padding:12px 14px">
      <div class="form-group" style="margin-bottom:8px"><textarea rows="2" oninput="admEditCheck(${i},this.value)">${(c.t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}</textarea></div>
      ${admCheckStage==='deep'?`<div class="adm-gtags">${DATA.map(g=>`<button class="gtag ${(c.g||[]).includes(g.id)?'on':''}" onclick="admToggleCheckG(${i},'${g.id}',this)">${g.short}</button>`).join('')}</div>`:''}
      <button class="btn btn-sm btn-del" onclick="admDelCheck(${i})"><i class="ti ti-trash"></i> 문항 삭제</button>
    </div>`;
  });
  html+=`<button class="btn" onclick="admAddCheck()"><i class="ti ti-plus"></i> 문항 추가</button>`;
  body.innerHTML=html;
}
function curBank(){
  const bankObj=admCheckKind==='self'?E_SELF:E_CHILD;
  return admCheckStage==='basic'?bankObj.basic:bankObj.deep;
}
function admEditCheck(i,v){curBank()[i].t=v;markDirty();}
function admToggleCheckG(i,gid,btn){
  const c=curBank()[i];if(!c.g)c.g=[];
  const idx=c.g.indexOf(gid);
  if(idx>-1)c.g.splice(idx,1);else c.g.push(gid);
  btn.classList.toggle('on');markDirty();
}
function admDelCheck(i){if(!confirm('이 문항을 삭제할까요?'))return;curBank().splice(i,1);markDirty();admRenderChecks();}
function admAddCheck(){curBank().push(admCheckStage==='deep'?{t:'',g:[]}:{t:''});markDirty();admRenderChecks();}

/* --- 변증 편집 --- */
function admRenderDebate(){
  if(!admGroupId)admGroupId=E_DATA[0].id;
  const body=document.getElementById('adm-body');
  const pills=E_DATA.map(g=>`<button class="group-pill ${g.id===admGroupId?'on':''}" onclick="admGroupId='${g.id}';admRenderDebate()">${g.short}</button>`).join('');
  const g=E_DATA.find(x=>x.id===admGroupId);
  if(!g.debates)g.debates=[];
  let html=`<div class="pill-row">${pills}</div>`;
  html+=`<div class="lead" style="margin-bottom:8px">각 주제 안의 말풍선을 수정하거나 추가할 수 있습니다.</div>`;
  g.debates.forEach((d,di)=>{
    html+=`<div class="card">
      <div class="form-group"><label class="adm-lab">주제 ${di+1}</label><input type="text" value="${(d.topic||'').replace(/"/g,'&quot;')}" oninput="admEditTopic(${di},this.value)"></div>`;
    (d.turns||[]).forEach((t,ti)=>{
      const isUs=t.who==='us';
      html+=`<div class="turn-edit ${isUs?'us':'them'}">
        <div class="turn-edit-head">
          <button class="who-btn ${!isUs?'on':''}" onclick="admSetWho(${di},${ti},'them',this)">그들의 말</button>
          <button class="who-btn ${isUs?'on':''}" onclick="admSetWho(${di},${ti},'us',this)">우리의 답</button>
          <button class="btn-del2" onclick="admDelTurn(${di},${ti})"><i class="ti ti-x"></i></button>
        </div>
        <textarea rows="2" placeholder="말풍선 내용" oninput="admEditTurn(${di},${ti},'text',this.value)">${(t.text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}</textarea>
        <input type="text" placeholder="성경 출처 (예: 요 3:16) — 선택" value="${t.verse?(t.verse[0]||'').replace(/"/g,'&quot;'):''}" oninput="admEditVerse(${di},${ti},0,this.value)" style="margin-top:6px">
        <input type="text" placeholder="성경 본문 — 선택" value="${t.verse?(t.verse[1]||'').replace(/"/g,'&quot;'):''}" oninput="admEditVerse(${di},${ti},1,this.value)" style="margin-top:6px">
      </div>`;
    });
    html+=`<button class="btn btn-sm" onclick="admAddTurn(${di})"><i class="ti ti-plus"></i> 말풍선 추가</button>
      <button class="btn btn-sm btn-del" onclick="admDelTopic(${di})"><i class="ti ti-trash"></i> 주제 삭제</button>
    </div>`;
  });
  html+=`<button class="btn" onclick="admAddTopic()"><i class="ti ti-plus"></i> 변증 주제 추가</button>`;
  body.innerHTML=html;
}
function curG(){return E_DATA.find(x=>x.id===admGroupId);}
function admEditTopic(di,v){curG().debates[di].topic=v;markDirty();}
function admSetWho(di,ti,who,btn){curG().debates[di].turns[ti].who=who;markDirty();admRenderDebate();}
function admEditTurn(di,ti,k,v){curG().debates[di].turns[ti][k]=v;markDirty();}
function admEditVerse(di,ti,idx,v){
  const t=curG().debates[di].turns[ti];
  if(!t.verse)t.verse=['',''];
  t.verse[idx]=v;
  if(!t.verse[0]&&!t.verse[1])delete t.verse;
  markDirty();
}
function admDelTurn(di,ti){if(!confirm('이 말풍선을 삭제할까요?'))return;curG().debates[di].turns.splice(ti,1);markDirty();admRenderDebate();}
function admAddTurn(di){curG().debates[di].turns.push({who:'them',text:''});markDirty();admRenderDebate();}
function admDelTopic(di){if(!confirm('이 변증 주제 전체를 삭제할까요?'))return;curG().debates.splice(di,1);markDirty();admRenderDebate();}
function admAddTopic(){curG().debates.push({topic:'새 주제',icon:'ti-message-2',turns:[{who:'them',text:''}]});markDirty();admRenderDebate();}

/* --- 내보내기 --- */
function tryExport(){
  if(admDirty){alert('저장하지 않은 변경이 있습니다.\n먼저 "저장"을 누른 뒤 내보내기 해주세요.');return;}
  exportSite();
}
async function exportSite(){
  const data={data:DATA, self:CHECKS_SELF, child:CHECKS_CHILD, pw:ADMIN_PW};
  const json=JSON.stringify(data).split('<\/script>').join('<\\/script>');
  const inject='<script>/*__PRESET_START__*/window.__PRESET__='+json+';/*__PRESET_END__*/<\/script>';
  let src;
  try{
    const res=await fetch(window.location.href,{cache:'no-store'});
    src=await res.text();
  }catch(e){
    src='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  }
  src=src.replace(/<script>\/\*__PRESET_START__\*\/[\s\S]*?\/\*__PRESET_END__\*\/<\/script>\s*/g,'');
  if(src.indexOf('<head>')>-1){src=src.replace('<head>','<head>\n'+inject);}
  else{src=src.replace('</head>',inject+'\n</head>');}
  const blob=new Blob([src],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='index.html';a.click();
  URL.revokeObjectURL(url);
  alert('index.html 파일이 다운로드되었습니다.\nGitHub의 index.html에 덮어쓰면 모든 사람에게 반영됩니다.');
}
