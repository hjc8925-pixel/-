<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이단 식별 진단 시스템</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efea;
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #999;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
    --radius: 8px; --radius-lg: 12px;
    --teal-bg: #E1F5EE; --teal-border: #1D9E75; --teal-text: #085041;
    --amber-bg: #FAEEDA; --amber-border: #BA7517; --amber-text: #633806;
    --red-bg: #FCEBEB; --red-border: #E24B4A; --red-text: #791F1F;
    --blue-bg: #E6F1FB; --blue-border: #378ADD; --blue-text: #0C447C;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e; --bg2: #2a2a2a; --bg3: #333;
      --text: #f0f0f0; --text2: #aaa; --text3: #666;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --teal-bg: #0a2e22; --teal-text: #5DCAA5;
      --amber-bg: #2e1f05; --amber-text: #EF9F27;
      --red-bg: #2e0a0a; --red-text: #F09595;
      --blue-bg: #051830; --blue-text: #85B7EB;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; font-size: 15px; color: var(--text); background: var(--bg3); min-height: 100vh; line-height: 1.6; }
  .app { max-width: 760px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .app-header { margin-bottom: 1.5rem; }
  .app-header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .app-header p { font-size: 13px; color: var(--text2); }
  .tab-bar { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .tab { padding: 8px 16px; border-radius: var(--radius) var(--radius) 0 0; cursor: pointer; font-size: 14px; color: var(--text2); border: 1px solid transparent; background: transparent; border-bottom: none; position: relative; bottom: -1px; font-family: inherit; }
  .tab.active { color: var(--text); font-weight: 500; border-color: var(--border); background: var(--bg); border-bottom: 1px solid var(--bg); }
  .page { display: none; } .page.active { display: block; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .badge { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: var(--radius); font-weight: 500; }
  .badge-red { background: var(--red-bg); color: var(--red-text); }
  .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
  .badge-blue { background: var(--blue-bg); color: var(--blue-text); }
  .badge-teal { background: var(--teal-bg); color: var(--teal-text); }
  .badge-purple { background: #EEEDFE; color: #534AB7; }
  .badge-gray { background: var(--bg2); color: var(--text2); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: transparent; cursor: pointer; font-size: 14px; color: var(--text); font-family: inherit; transition: background .15s; }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { opacity: .85; background: var(--text); }
  .btn-danger { color: var(--red-text); border-color: #F7C1C1; }
  .btn-danger:hover { background: var(--red-bg); }
  .btn-sm { padding: 5px 10px; font-size: 13px; }
  input[type=text], input[type=password], textarea, select { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-family: inherit; font-size: 14px; background: var(--bg); color: var(--text); }
  textarea { resize: vertical; min-height: 80px; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .check-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .check-item:last-child { border-bottom: none; }
  .check-item input[type=checkbox] { width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px; cursor: pointer; accent-color: var(--text); }
  .check-item label { font-size: 14px; line-height: 1.55; cursor: pointer; flex: 1; }
  .check-sub { font-size: 12px; color: var(--text2); margin-top: 3px; display: block; }
  .step-wrap { display: flex; align-items: center; margin-bottom: 1.5rem; }
  .step-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
  .step-dot.done { background: #1D9E75; color: #fff; }
  .step-dot.active { background: var(--text); color: var(--bg); }
  .step-dot.idle { background: var(--bg2); color: var(--text2); }
  .step-line { flex: 1; height: 1px; background: var(--border); }
  .step-col { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .step-label { font-size: 11px; color: var(--text2); white-space: nowrap; }
  .result-bar { height: 8px; border-radius: 4px; background: var(--bg2); margin-top: 4px; overflow: hidden; }
  .result-fill { height: 100%; border-radius: 4px; transition: width .4s; }

  .doc-card { border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 1.25rem; overflow: hidden; background: var(--bg); }
  .doc-head { padding: 12px 16px; background: var(--bg2); font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .doc-body { padding: 16px; }
  .claim-block { padding: 14px 16px; border-radius: var(--radius); margin-bottom: 12px; }
  .claim-block:last-child { margin-bottom: 0; }
  .claim-wrong { background: var(--red-bg); border-left: 3px solid var(--red-border); }
  .claim-right { background: var(--teal-bg); border-left: 3px solid var(--teal-border); }
  .claim-label { font-size: 12px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .claim-wrong .claim-label { color: var(--red-text); }
  .claim-right .claim-label { color: var(--teal-text); }
  .claim-text { font-size: 14px; line-height: 1.65; }
  .claim-wrong .claim-text { color: var(--red-text); }
  .claim-right .claim-text { color: var(--text); }
  .verse-card { background: var(--bg); border: 0.5px solid var(--teal-border); border-radius: var(--radius); padding: 12px 14px; margin-top: 10px; }
  .verse-ref { font-size: 12px; font-weight: 600; color: var(--teal-text); margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
  .verse-text { font-size: 14px; line-height: 1.7; color: var(--text); font-style: italic; }
  .verse-text::before { content: '\201C'; } .verse-text::after { content: '\201D'; }

  .info-box { padding: 1rem 1.25rem; border-radius: var(--radius); margin-bottom: 1rem; font-size: 14px; line-height: 1.6; }
  .info-teal { background: var(--teal-bg); border-left: 3px solid var(--teal-border); color: var(--teal-text); }
  .info-amber { background: var(--amber-bg); border-left: 3px solid var(--amber-border); color: var(--amber-text); }
  .info-red { background: var(--red-bg); border-left: 3px solid var(--red-border); color: var(--red-text); }
  .info-blue { background: var(--blue-bg); border-left: 3px solid var(--blue-border); color: var(--blue-text); }
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1.5rem; width: 92%; max-width: 540px; max-height: 85vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: var(--radius); background: var(--bg2); color: var(--text2); margin: 2px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .empty { text-align: center; padding: 2rem; color: var(--text2); font-size: 14px; }
  .group-sec-title { font-size: 13px; font-weight: 500; color: var(--text2); margin: 1rem 0 6px; padding-bottom: 4px; border-bottom: 0.5px solid var(--border); }
  .adm-sub { display: none; }
  .target-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
  @media (max-width: 500px) { .target-grid { grid-template-columns: 1fr; } }
  .target-card { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem 1.25rem; cursor: pointer; text-align: center; transition: all .15s; background: var(--bg); }
  .target-card:hover { border-color: var(--text2); }
  .target-card.sel { border: 2px solid var(--blue-border); background: var(--blue-bg); }
  .target-card .ti { font-size: 32px; margin-bottom: 8px; display: block; }
  .target-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .target-card p { font-size: 12px; color: var(--text2); line-height: 1.5; }
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <h1>이단 식별 진단 시스템</h1>
    <p>포교 수법 및 교리 분석을 통한 이단 식별 · 정통 교리 안내</p>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('diagnose')"><i class="ti ti-clipboard-check"></i> 진단</button>
    <button class="tab" onclick="switchTab('doctrines')"><i class="ti ti-book"></i> 교리 자료</button>
    <button class="tab" onclick="switchTab('admin')"><i class="ti ti-settings"></i> 관리자</button>
  </div>

  <div id="tab-diagnose" class="page active">
    <div id="step0" class="page active">
      <div class="card">
        <p style="font-size:15px;font-weight:500;margin-bottom:4px">누구를 진단하시나요?</p>
        <p style="font-size:13px;color:var(--text2);margin-bottom:1.25rem">진단 대상에 따라 다른 체크리스트가 제공됩니다.</p>
        <div class="target-grid">
          <div class="target-card" id="tc-self" onclick="selectTarget('self')">
            <i class="ti ti-user"></i>
            <h3>본인 진단</h3>
            <p>내가 직접 접촉하거나 권유받은 내용을 점검합니다</p>
          </div>
          <div class="target-card" id="tc-child" onclick="selectTarget('child')">
            <i class="ti ti-users-group"></i>
            <h3>자녀 진단</h3>
            <p>부모가 관찰한 자녀의 행동 변화를 점검합니다</p>
          </div>
        </div>
      </div>
    </div>

    <div id="diag-steps" style="display:none">
      <div class="step-wrap">
        <div class="step-col"><div class="step-dot active" id="sdot1">1</div><span class="step-label" id="slbl1">포교 수법</span></div>
        <div class="step-line"></div>
        <div class="step-col"><div class="step-dot idle" id="sdot2">2</div><span class="step-label">심층 진단</span></div>
        <div class="step-line"></div>
        <div class="step-col"><div class="step-dot idle" id="sdot3">3</div><span class="step-label">교리 안내</span></div>
      </div>
      <div id="step1" class="page active">
        <div class="info-box info-blue" id="step1-intro"></div>
        <div class="card">
          <div id="s1-list"></div>
          <div style="margin-top:1rem;display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-primary" onclick="runStep1()"><i class="ti ti-arrow-right"></i> 다음 단계</button>
            <button class="btn" onclick="backToTarget()"><i class="ti ti-arrow-left"></i> 대상 다시 선택</button>
          </div>
        </div>
      </div>
      <div id="step2" class="page">
        <div class="info-box info-amber" id="s2-hint"></div>
        <div class="card">
          <p style="font-size:14px;font-weight:500;margin-bottom:4px">심층 확인</p>
          <p style="font-size:13px;color:var(--text2);margin-bottom:1rem" id="s2-sub">아래 내용을 배우거나 들은 적이 있는지 체크해 주세요.</p>
          <div id="s2-list"></div>
          <div style="margin-top:1rem;display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn" onclick="goStep(1)"><i class="ti ti-arrow-left"></i> 이전</button>
            <button class="btn btn-primary" onclick="runStep2()"><i class="ti ti-arrow-right"></i> 결과 보기</button>
          </div>
        </div>
      </div>
      <div id="step3" class="page">
        <div id="s3-result"></div>
        <div style="margin-top:.5rem"><button class="btn" onclick="backToTarget()"><i class="ti ti-refresh"></i> 처음부터</button></div>
      </div>
    </div>
  </div>

  <div id="tab-doctrines" class="page">
    <div id="filter-bar" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem"></div>
    <div id="doctrine-list"></div>
  </div>

  <div id="tab-admin" class="page">
    <div id="admin-login-wrap">
      <div class="card" style="max-width:340px;margin:0 auto">
        <p style="font-weight:500;margin-bottom:1rem">관리자 로그인</p>
        <div class="form-group"><label>비밀번호</label><input type="password" id="adm-pw" onkeydown="if(event.key==='Enter')adminLogin()"></div>
        <button class="btn btn-primary" onclick="adminLogin()">로그인</button>
        <p style="font-size:12px;color:var(--text2);margin-top:8px">기본 비밀번호: 1234</p>
      </div>
    </div>
    <div id="admin-wrap" style="display:none">
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem">
        <button class="btn" onclick="showAdm('g')"><i class="ti ti-users"></i> 교단</button>
        <button class="btn" onclick="showAdm('c1')"><i class="ti ti-list-check"></i> 1단계(본인)</button>
        <button class="btn" onclick="showAdm('cc')"><i class="ti ti-users-group"></i> 1단계(자녀)</button>
        <button class="btn" onclick="showAdm('c2')"><i class="ti ti-zoom-question"></i> 2단계</button>
        <button class="btn" onclick="showAdm('d')"><i class="ti ti-book"></i> 교리</button>
        <button class="btn btn-danger" style="margin-left:auto" onclick="adminLogout()"><i class="ti ti-logout"></i> 로그아웃</button>
      </div>
      <div id="adm-g" class="adm-sub"></div>
      <div id="adm-c1" class="adm-sub"></div>
      <div id="adm-cc" class="adm-sub"></div>
      <div id="adm-c2" class="adm-sub"></div>
      <div id="adm-d" class="adm-sub"></div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="mod-g">
  <div class="modal">
    <p class="modal-title">교단 추가</p>
    <div class="form-group"><label>교단명</label><input type="text" id="g-name"></div>
    <div class="form-group"><label>색상</label>
      <select id="g-color"><option value="red">빨강</option><option value="amber">주황</option><option value="blue">파랑</option><option value="teal">청록</option><option value="purple">보라</option></select>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem">
      <button class="btn" onclick="closeModal('mod-g')">취소</button>
      <button class="btn btn-primary" onclick="saveGroup()">저장</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="mod-c">
  <div class="modal">
    <p class="modal-title" id="mod-c-title">항목 추가</p>
    <input type="hidden" id="mod-c-bank"><input type="hidden" id="mod-c-editid">
    <div class="form-group"><label>내용</label><textarea id="c-content"></textarea></div>
    <div class="form-group"><label>설명 (선택)</label><input type="text" id="c-desc" placeholder="예: 신천지 비유한 나무 도표 수업"></div>
    <div class="form-group"><label>해당 교단</label><div id="c-groups-sel" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px"></div></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem">
      <button class="btn" onclick="closeModal('mod-c')">취소</button>
      <button class="btn btn-primary" onclick="saveCheck()">저장</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="mod-d">
  <div class="modal">
    <p class="modal-title" id="mod-d-title">교리 추가</p>
    <input type="hidden" id="mod-d-editid">
    <div class="form-group"><label>교리 주제</label><input type="text" id="d-topic"></div>
    <div class="form-group"><label>교단</label><select id="d-group"></select></div>
    <div class="form-group"><label>이단 주장</label><textarea id="d-wrong"></textarea></div>
    <div class="form-group"><label>정통 교리 (설명)</label><textarea id="d-right"></textarea></div>
    <div class="form-group"><label>성경 구절 (선택 · 한 줄에 하나 · 형식: 출처 | 본문)</label><textarea id="d-verses" placeholder="엡 2:8-9 | 너희는 그 은혜에 의하여 믿음으로 말미암아 구원을 받았으니..."></textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem">
      <button class="btn" onclick="closeModal('mod-d')">취소</button>
      <button class="btn btn-primary" onclick="saveDoctrine()">저장</button>
    </div>
  </div>
</div>

<script>
const LS={get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};
function uid(){return'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,5)}

let groups=LS.get('hd_groups')||[
  {id:'scj',name:'신천지',color:'red'},
  {id:'wms',name:'하나님의교회(안상홍)',color:'amber'},
  {id:'jms',name:'JMS(정명석)',color:'blue'}
];
let checks1=LS.get('hd_c1')||[
  {id:'1a',content:'성경공부나 모임에 초대하면서 처음에 단체명을 밝히지 않았다',desc:'',groups:['scj','wms','jms']},
  {id:'1b',content:'무료 봉사활동, 문화센터, 동아리, SNS 등을 통해 접근했다',desc:'',groups:['scj','wms','jms']},
  {id:'1c',content:'자신들만이 구원받는다고 강조하며 기존 교회와 목사를 강하게 비판했다',desc:'',groups:['scj','wms']},
  {id:'1d',content:'지도자에 대한 절대적 순종과 헌신을 강요했다',desc:'',groups:['scj','wms','jms']},
  {id:'1e',content:'유월절을 지켜야 구원을 받는다고 가르쳤다',desc:'',groups:['wms']},
  {id:'1f',content:'일요일 예배(주일)는 성경적이지 않다고 했다',desc:'태양신 숭배 기원이라고 주장',groups:['wms']},
  {id:'1g',content:'크리스마스, 십자가는 이방 종교에서 왔으니 지키거나 사용하면 안 된다고 했다',desc:'',groups:['wms']},
  {id:'1h',content:'144,000명 안에 들어야 구원받는다고 가르쳤다',desc:'',groups:['scj']},
  {id:'1i',content:'성경을 비유와 상징으로 풀어야 진짜 의미를 알 수 있다고 강조했다',desc:'신천지 비유풀이 교육의 특징',groups:['scj']},
  {id:'1j',content:'요한계시록의 비밀을 자신들의 지도자만 알 수 있다고 주장했다',desc:'',groups:['scj']},
  {id:'1k',content:'섭리, CGM, JMS 이름으로 접근하거나 문화·예술 활동으로 유인했다',desc:'',groups:['jms']},
];

function save(){LS.set('hd_groups',groups);LS.set('hd_c1',checks1);LS.set('hd_cc',checksChild);LS.set('hd_c2',checks2);LS.set('hd_doctrines',doctrines);}
function getG(id){return groups.find(g=>g.id===id)||{name:id,color:'gray'}}
function bc(c){return'badge badge-'+c}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('[id^="tab-"]').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab')[{diagnose:0,doctrines:1,admin:2}[name]].classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='doctrines')renderDoctrines('all');
  if(name==='admin'&&isAdmin)showAdm('g');
}

function selectTarget(t){
  diagTarget=t;
  document.getElementById('tc-self').classList.toggle('sel',t==='self');
  document.getElementById('tc-child').classList.toggle('sel',t==='child');
  document.getElementById('step0').classList.remove('active');
  document.getElementById('diag-steps').style.display='block';
  step1Suspects=[];window._fg=[];
  goStep(1);
}
function backToTarget(){
  document.getElementById('diag-steps').style.display='none';
  document.getElementById('step0').classList.add('active');
  document.getElementById('tc-self').classList.remove('sel');
  document.getElementById('tc-child').classList.remove('sel');
}

function goStep(n){
  ['step1','step2','step3'].forEach((s,i)=>{
    document.getElementById(s).classList.toggle('active',i===n-1);
    const dot=document.getElementById('sdot'+(i+1));
    dot.className='step-dot '+(i<n-1?'done':i===n-1?'active':'idle');
  });
  if(n===1)renderS1(); if(n===2)renderS2(); if(n===3)renderS3();
}

  }
  const bank=curBank1();
  document.getElementById('s1-list').innerHTML=bank.map(c=>`
    <div class="check-item">
      <input type="checkbox" id="s1_${c.id}" data-id="${c.id}">
      <label for="s1_${c.id}">${c.content}${c.desc?`<span class="check-sub"><i class="ti ti-info-circle" style="font-size:12px"></i> ${c.desc}</span>`:''}</label>
    </div>`).join('');
}

function runStep1(){
  const bank=curBank1();
  const checked=[];
  document.querySelectorAll('#s1-list input:checked').forEach(i=>checked.push(i.dataset.id));
  if(!checked.length){alert('하나 이상 체크해 주세요.');return;}
  const scores={};groups.forEach(g=>{scores[g.id]=0;});
  checked.forEach(cid=>{const c=bank.find(x=>x.id===cid);if(c)c.groups.forEach(gid=>{if(scores[gid]!==undefined)scores[gid]++;});});
  step1Suspects=groups.map(g=>({...g,score:scores[g.id]||0})).filter(g=>g.score>0).sort((a,b)=>b.score-a.score);
  goStep(2);
}

function renderS2(){
  const hint=document.getElementById('s2-hint');
  const sub=document.getElementById('s2-sub');
  sub.textContent=diagTarget==='child'?'자녀가 아래 내용을 배우거나 언급한 적이 있다면 체크해 주세요.':'아래 내용을 배우거나 들은 적이 있는지 체크해 주세요.';
  if(!step1Suspects.length){hint.className='info-box info-teal';hint.innerHTML='일치하는 교단이 없습니다. 담당 사역자에게 상담을 요청하세요.';document.getElementById('s2-list').innerHTML='';return;}
  const top=step1Suspects[0];
  const others=step1Suspects.slice(1).map(g=>g.name).join(', ');
  hint.className='info-box info-amber';
  hint.innerHTML=`<strong>1단계 결과: <span class="${bc(top.color)}">${top.name}</span> 가능성이 높습니다.</strong>${others?`<br><small>추가 관련: ${others}</small>`:''}<br><small style="margin-top:4px;display:block">아래 질문 중 해당하는 것을 체크해 주세요.</small>`;
  const relevantGids=step1Suspects.map(g=>g.id);
  const byGroup={};
  relevantGids.forEach(gid=>{const rel=checks2.filter(c=>c.groups.includes(gid));if(rel.length)byGroup[gid]=rel;});
  document.getElementById('s2-list').innerHTML=Object.entries(byGroup).map(([gid,cs])=>{
    const g=getG(gid);
    return`<div style="margin-bottom:1rem"><p class="group-sec-title"><span class="${bc(g.color)}">${g.name}</span> 관련 질문</p>
    ${cs.map(c=>`<div class="check-item"><input type="checkbox" id="s2_${c.id}" data-id="${c.id}" data-groups='${JSON.stringify(c.groups)}'><label for="s2_${c.id}">${c.content}${c.desc?`<span class="check-sub"><i class="ti ti-info-circle" style="font-size:12px"></i> ${c.desc}</span>`:''}</label></div>`).join('')}</div>`;
  }).join('');
}

function runStep2(){
  const scores={};groups.forEach(g=>{scores[g.id]=0;});
  step1Suspects.forEach(g=>{scores[g.id]+=g.score;});
  document.querySelectorAll('#s2-list input:checked').forEach(i=>{JSON.parse(i.dataset.groups).forEach(gid=>{if(scores[gid]!==undefined)scores[gid]+=2;});});
  window._fg=groups.map(g=>({...g,score:scores[g.id]||0})).filter(g=>g.score>0).sort((a,b)=>b.score-a.score);
  goStep(3);
}

function renderVerses(verses){
  if(!verses||!verses.length)return'';
  return verses.map(v=>`<div class="verse-card"><p class="verse-ref"><i class="ti ti-book-2" style="font-size:13px"></i> ${v[0]}</p><p class="verse-text">${v[1]}</p></div>`).join('');
}

function renderDocCard(d){
  const g=getG(d.group);
  return`<div class="doc-card">
    <div class="doc-head"><span class="${bc(g.color)}">${g.name}</span> ${d.topic}</div>
    <div class="doc-body">
      <div class="claim-block claim-wrong">
        <p class="claim-label"><i class="ti ti-alert-triangle"></i> 이단의 주장</p>
        <p class="claim-text">${d.wrong}</p>
      </div>
      <div class="claim-block claim-right">
        <p class="claim-label"><i class="ti ti-shield-check"></i> 성경이 말하는 진리</p>
        <p class="claim-text">${d.right}</p>
        ${renderVerses(d.verses)}
      </div>
    </div>
  </div>`;
}

function renderS3(){
  const final=window._fg||[];
  const el=document.getElementById('s3-result');
  if(!final.length){el.innerHTML=`<div class="info-box info-teal">일치하는 교단을 찾지 못했습니다. 담당 사역자에게 상담을 요청하세요.</div>`;return;}
  const top=final[0];const maxScore=top.score;
  const relDocs=doctrines.filter(d=>d.group===top.id);
  const note=diagTarget==='child'?'<p style="font-size:13px;margin-top:6px">자녀가 위 교단의 영향을 받고 있을 수 있습니다. 비난보다 대화로 접근하시고, 전문 이단상담 기관과 연계하시길 권합니다.</p>':'<p style="font-size:13px;margin-top:6px">아래 자료를 통해 바른 성경 이해를 확인하세요.</p>';
  el.innerHTML=`
    <div class="info-box info-red"><strong style="font-size:15px"><i class="ti ti-alert-triangle"></i> 진단 결과: ${top.name} 가능성이 높습니다.</strong>${note}</div>
    <div style="margin-bottom:1.5rem">${final.map(g=>{const pct=Math.round(g.score/maxScore*100);return`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>${g.name}</span><span style="color:var(--text2)">${pct}%</span></div><div class="result-bar"><div class="result-fill" style="width:${pct}%;background:${colorMap[g.color]||'#888'}"></div></div></div>`;}).join('')}</div>
    <h2 style="font-size:17px;font-weight:600;margin-bottom:1rem"><i class="ti ti-book-2"></i> ${top.name} 교리 — 무엇이 다른가</h2>
    ${relDocs.length?relDocs.map(renderDocCard).join(''):'<div class="empty">등록된 교리 자료가 없습니다.</div>'}`;
}

function renderDoctrines(fgid){
  const fb=document.getElementById('filter-bar');
  fb.innerHTML=`<button class="btn btn-sm" onclick="renderDoctrines('all')" style="${fgid==='all'?'font-weight:600':''}">전체</button>`+
    groups.map(g=>`<button class="btn btn-sm" onclick="renderDoctrines('${g.id}')" style="${fgid===g.id?'font-weight:600':''}">${g.name}</button>`).join('');
  const list=fgid==='all'?doctrines:doctrines.filter(d=>d.group===fgid);
  const el=document.getElementById('doctrine-list');
  if(!list.length){el.innerHTML='<div class="empty">등록된 교리 자료가 없습니다.</div>';return;}
  el.innerHTML=list.map(renderDocCard).join('');
}

function adminLogin(){
  if(document.getElementById('adm-pw').value===adminPw){isAdmin=true;document.getElementById('admin-login-wrap').style.display='none';document.getElementById('admin-wrap').style.display='block';showAdm('g');}
  else alert('비밀번호가 올바르지 않습니다.');
}
function adminLogout(){isAdmin=false;document.getElementById('admin-login-wrap').style.display='block';document.getElementById('admin-wrap').style.display='none';document.getElementById('adm-pw').value='';}

function showAdm(w){document.querySelectorAll('.adm-sub').forEach(s=>s.style.display='none');document.getElementById('adm-'+w).style.display='block';
  if(w==='g')renderAdmG();if(w==='c1')renderAdmC('c1');if(w==='cc')renderAdmC('cc');if(w==='c2')renderAdmC('c2');if(w==='d')renderAdmD();}

function bankOf(key){return key==='c1'?checks1:key==='cc'?checksChild:checks2;}
function bankLabel(key){return key==='c1'?'1단계 — 본인용 (포교 수법)':key==='cc'?'1단계 — 자녀용 (행동 변화)':'2단계 — 심층 교리 질문';}

function renderAdmG(){const el=document.getElementById('adm-g');el.innerHTML=`<div class="section-header"><p style="font-weight:500">교단 목록</p><button class="btn btn-primary btn-sm" onclick="openModal('mod-g')"><i class="ti ti-plus"></i> 추가</button></div>`+(groups.length?groups.map(g=>`<div class="card" style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span class="${bc(g.color)}">${g.name}</span><button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="deleteGroup('${g.id}')"><i class="ti ti-trash"></i></button></div>`).join(''):'<div class="empty">없음</div>');}

function renderAdmC(key){const arr=bankOf(key);const el=document.getElementById('adm-'+key);el.innerHTML=`<div class="section-header"><p style="font-weight:500">${bankLabel(key)}</p><button class="btn btn-primary btn-sm" onclick="openCheckModal('${key}',null)"><i class="ti ti-plus"></i> 추가</button></div>`+(arr.length?arr.map(c=>`<div class="card" style="margin-bottom:8px"><p style="font-size:14px;margin-bottom:4px">${c.content}</p>${c.desc?`<p style="font-size:12px;color:var(--text2);margin-bottom:6px">${c.desc}</p>`:''}<div style="margin-bottom:6px">${c.groups.map(gid=>`<span class="tag">${getG(gid).name}</span>`).join('')}</div><div style="display:flex;gap:6px"><button class="btn btn-sm" onclick="openCheckModal('${key}','${c.id}')"><i class="ti ti-edit"></i></button><button class="btn btn-danger btn-sm" onclick="deleteCheck('${key}','${c.id}')"><i class="ti ti-trash"></i></button></div></div>`).join(''):'<div class="empty">없음</div>');}

function renderAdmD(){const el=document.getElementById('adm-d');el.innerHTML=`<div class="section-header"><p style="font-weight:500">정통 교리 자료</p><button class="btn btn-primary btn-sm" onclick="openDocModal(null)"><i class="ti ti-plus"></i> 추가</button></div>`+(doctrines.length?doctrines.map(d=>{const g=getG(d.group);return`<div class="card" style="margin-bottom:8px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span class="${bc(g.color)}">${g.name}</span><span style="font-weight:500;font-size:14px">${d.topic}</span></div><p style="font-size:12px;color:#A32D2D;margin-bottom:2px">[이단] ${d.wrong.slice(0,55)}…</p><p style="font-size:12px;color:#0F6E56;margin-bottom:4px">[정통] ${d.right.slice(0,55)}…</p>${d.verses&&d.verses.length?`<p style="font-size:11px;color:var(--text2);margin-bottom:8px"><i class="ti ti-book-2" style="font-size:11px"></i> ${d.verses.map(v=>v[0]).join(', ')}</p>`:''}<div style="display:flex;gap:6px"><button class="btn btn-sm" onclick="openDocModal('${d.id}')"><i class="ti ti-edit"></i></button><button class="btn btn-danger btn-sm" onclick="deleteDoctrine('${d.id}')"><i class="ti ti-trash"></i></button></div></div>`;}).join(''):'<div class="empty">없음</div>');}

function openCheckModal(key,id){const arr=bankOf(key);const item=id?arr.find(c=>c.id===id):null;document.getElementById('mod-c-title').textContent=bankLabel(key)+' '+(id?'수정':'추가');document.getElementById('mod-c-bank').value=key;document.getElementById('mod-c-editid').value=id||'';document.getElementById('c-content').value=item?item.content:'';document.getElementById('c-desc').value=item?item.desc||'':'';document.getElementById('c-groups-sel').innerHTML=groups.map(g=>`<label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer"><input type="checkbox" value="${g.id}" ${item&&item.groups.includes(g.id)?'checked':''}> ${g.name}</label>`).join('');openModal('mod-c');}

function saveCheck(){const key=document.getElementById('mod-c-bank').value;const eid=document.getElementById('mod-c-editid').value;const content=document.getElementById('c-content').value.trim();const desc=document.getElementById('c-desc').value.trim();const selG=[...document.querySelectorAll('#c-groups-sel input:checked')].map(i=>i.value);if(!content){alert('내용을 입력하세요.');return;}if(!selG.length){alert('교단을 선택하세요.');return;}const arr=bankOf(key);if(eid){const i=arr.findIndex(c=>c.id===eid);if(i>-1)arr[i]={...arr[i],content,desc,groups:selG};}else arr.push({id:uid(),content,desc,groups:selG});save();closeModal('mod-c');renderAdmC(key);}

function deleteCheck(key,id){if(!confirm('삭제?'))return;if(key==='c1')checks1=checks1.filter(c=>c.id!==id);else if(key==='cc')checksChild=checksChild.filter(c=>c.id!==id);else checks2=checks2.filter(c=>c.id!==id);save();renderAdmC(key);}

function openDocModal(id){const item=id?doctrines.find(d=>d.id===id):null;document.getElementById('mod-d-title').textContent=id?'교리 수정':'교리 추가';document.getElementById('mod-d-editid').value=id||'';document.getElementById('d-topic').value=item?item.topic:'';document.getElementById('d-wrong').value=item?item.wrong:'';document.getElementById('d-right').value=item?item.right:'';document.getElementById('d-verses').value=item&&item.verses?item.verses.map(v=>v[0]+' | '+v[1]).join('\n'):'';document.getElementById('d-group').innerHTML=groups.map(g=>`<option value="${g.id}" ${item&&item.group===g.id?'selected':''}>${g.name}</option>`).join('');openModal('mod-d');}

function saveDoctrine(){const id=document.getElementById('mod-d-editid').value;const topic=document.getElementById('d-topic').value.trim();const wrong=document.getElementById('d-wrong').value.trim();const right=document.getElementById('d-right').value.trim();const group=document.getElementById('d-group').value;const versesRaw=document.getElementById('d-verses').value.trim();if(!topic||!wrong||!right){alert('주제, 이단 주장, 정통 교리는 필수입니다.');return;}const verses=versesRaw?versesRaw.split('\n').map(l=>l.trim()).filter(l=>l).map(l=>{const p=l.split('|');return[p[0]?p[0].trim():'',p[1]?p[1].trim():''];}).filter(v=>v[0]&&v[1]):[];if(id){const i=doctrines.findIndex(d=>d.id===id);if(i>-1)doctrines[i]={...doctrines[i],topic,wrong,right,group,verses};}else doctrines.push({id:uid(),topic,wrong,right,group,verses});save();closeModal('mod-d');renderAdmD();}

function deleteDoctrine(id){if(!confirm('삭제?'))return;doctrines=doctrines.filter(d=>d.id!==id);save();renderAdmD();}
function saveGroup(){const name=document.getElementById('g-name').value.trim();const color=document.getElementById('g-color').value;if(!name){alert('교단명을 입력하세요.');return;}groups.push({id:uid(),name,color});save();closeModal('mod-g');renderAdmG();}
function deleteGroup(id){if(!confirm('삭제?'))return;groups=groups.filter(g=>g.id!==id);save();renderAdmG();}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-backdrop').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModal(m.id);}));
</script>
</body>
</html>
